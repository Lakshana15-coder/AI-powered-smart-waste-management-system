<!DOCTYPE html>
<html>
<head>
<title>Online Sales Website</title>
<link rel="stylesheet" href="style.css">
</head>
<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

header{
background:#333;
color:white;
padding:15px;
}

.product{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
display:inline-block;
width:200px;
}

button{
background:green;
color:white;
padding:10px;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<header>
<h1>My Online Sales Website</h1>
<p>Buy Products Easily</p>
</header>

<h2>Available Products</h2>

<div class="product">
<h3>Dress</h3>
<p>Price: ₹500</p>
<button>Add to Cart</button>
</div>

<div class="product">
<h3>Fish</h3>
<p>Price: ₹300</p>
<button>Add to Cart</button>
</div>

<div class="product">
<h3>Shoes</h3>
<p>Price: ₹900</p>
<button>Add to Cart</button>
</div>

</body>
</html>
